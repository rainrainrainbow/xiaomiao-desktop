name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util

      - name: Cache ESP-IDF
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: /opt/esp-idf
          key: ${{ runner.os }}-esp-idf-v5.3.1

      - name: Clone ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v5.3.1 --recursive https://github.com/espressif/esp-idf.git /opt/esp-idf
          /opt/esp-idf/install.sh esp32

      - name: Build
        run: |
          . /opt/esp-idf/export.sh
          idf.py build
          idf.py merge-bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaomiao-desktop-bin
          path: build/*merged*.bin
          retention-days: 7
