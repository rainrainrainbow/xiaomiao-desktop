name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util

      - name: Clone ESP-IDF
        run: |
          git clone --depth 1 --branch v5.3.1 --recursive https://github.com/espressif/esp-idf.git /opt/esp-idf

      - name: Install ESP-IDF tools
        run: |
          /opt/esp-idf/install.sh esp32
          . /opt/esp-idf/export.sh
          python $IDF_PATH/tools/idf_tools.py install

      - name: Build
        run: |
          . /opt/esp-idf/export.sh
          idf.py build
          idf.py merge-bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaomiao-desktop-bin
          path: build/*merged*.bin
          retention-days: 7
