name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESP-IDF
        uses: espressif/esp-idf@v5.5.4
        with:
          esp-idf-version: v5.5.4
          target: esp32

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          idf.py build
          idf.py merge-bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaomiao-desktop-bin
          path: build/*merged*.bin
          retention-days: 7
